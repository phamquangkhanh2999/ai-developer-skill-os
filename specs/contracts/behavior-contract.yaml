# Tập hợp tất cả các Behavior Contracts của hệ thống
# Đây là "Source of Truth" để các bài test đối chiếu.

bug-resolution:
  must:
    - ask_for_logs_when_missing
    - avoid_large_refactor
    - preserve_api
  prefer:
    - smallest_change
    - deterministic_fix
  never:
    - invent_root_cause
    - fabricate_test_result

feature-delivery:
  must:
    - minimize_scope
    - preserve_behavior
    - verify_regression
    - handle_ui_states
  prefer:
    - clean_code
  never:
    - redesign_architecture
    - rewrite_core_module

access-policy:
  must:
    - block_api
    - enforce_rbac
  never:
    - ui_only_security

engineering-standard:
  must:
    - maintain_readability
    - pass_linter
  never:
    - change_business_logic
