  state_database: "PostgreSQL_WAL_Replicated / CockroachDB"
  vector_engine: "Qdrant / Milvus / PgVector"
  cache_engine: "Redis_Cluster_v7.2"

  throughput_targets:
    max_executions_per_sec: 2500
    state_commit_latency_ms: 12
