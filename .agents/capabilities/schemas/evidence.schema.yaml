schema_version: 0.1
name: Evidence Schema
description: Enforces the hash chain integrity of any Evidence generated by a Capability.

properties:
  evidence_bundle:
    type: object
    properties:
      bundle_id:
        type: string
      capability_instance_id:
        type: string
        description: The ID of the capability instance that generated this evidence.
      timestamp:
        type: string
        
      observations:
        type: array
        items:
          type: object
          properties:
            observation_id:
              type: string
            source:
              type: string
            obs_hash:
              type: string
              
      evidence_nodes:
        type: array
        items:
          type: object
          properties:
            node_id:
              type: string
            type:
              type: string
            confidence:
              type: number
            parent_observation_ids:
              type: array
              items: { type: string }
            evidence_hash:
              type: string
              description: >
                Must equal SHA256(node_id + type + confidence + 
                SHA256(parent_observation_ids) + capability_instance_id)

required:
  - bundle_id
  - capability_instance_id
  - evidence_nodes
