adapter:
  id: vscode
  version: 1.0.0
  type: editor_gateway

  trust:
    level: L1

  purpose:
    accepts:
      - editor_context
      - selected_code
      - workspace_signal
    produces:
      - observation_bundle
      - capability_request

  governance:
    required:
      - observation_creation
      - provenance_tracking
      - capability_certification_check
      - decision_contract_validation
