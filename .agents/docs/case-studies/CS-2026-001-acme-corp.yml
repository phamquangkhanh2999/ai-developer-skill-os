organization:
  name:         "Acme Corp"          # required: true
  industry:     "Financial Services" # required: true
  size_band:    "1000-5000 engineers"
  anonymized:   false                # If true, name is redacted in public registry
  edaos_cert_level: "L4"

adoption:
