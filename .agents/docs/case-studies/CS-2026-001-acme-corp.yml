# ECONOMIC VALUE  (optional but strongly recommended)
# ─────────────────────────────────────────────────────────────────────────────

economics:
  engineering_rate_usd_per_hour: 100     # blended rate
  token_cost_usd_per_month:      5.90
  estimated_savings_per_month:   6720
  roi_multiplier:                1138.2
  payback_period_months:         0.1

