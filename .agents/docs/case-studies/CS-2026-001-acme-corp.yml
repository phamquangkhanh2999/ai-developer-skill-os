  incidents_reduction_pct:    66.9

# ─────────────────────────────────────────────────────────────────────────────
# QUALITATIVE SIGNALS
# ─────────────────────────────────────────────────────────────────────────────

qualitative:
  quotes:
    - text: >
        "Before EDAOS, every incident started with a 40-minute investigation
        just to understand what changed and why. Now the evidence chain tells
        us immediately — and half the time the system has already resolved it."
      role:   "VP Engineering"
      verified_by_auditor: true

    - text: >
        "The human veto was the thing that got legal and compliance comfortable.
        The AI never acts without a trail, and we can stop it at any moment."
      role:   "CISO"
      verified_by_auditor: true

  key_lessons:
    - "Saga rollback needed tuning for stateful database mutations — 2-week effort."
    - "L3 governance compliance required alignment with existing change management process."
    - "Public Evidence Explorer became the de facto incident post-mortem tool."

  what_did_not_work:
    - "Initial policy thresholds were too aggressive — caused false positives in week 1."
    - "Onboarding 3 legacy repos required custom evidence adapters."

