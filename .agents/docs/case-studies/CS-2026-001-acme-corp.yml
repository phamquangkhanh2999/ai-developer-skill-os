# ─────────────────────────────────────────────────────────────────────────────

baseline:
  measurement_period:  "2025-10-01 to 2026-01-31"   # 4-month window
  data_source:         "PagerDuty + Datadog"
  incidents_per_month: 16
  mttr_hours:          4.2          # Mean Time to Resolve
  defect_escape_rate:  0.084        # fraction (8.4%)
  lcp_p75_ms:          3800
  bundle_size_kb:      380
  manual_review_hours_per_sprint: 14

# ─────────────────────────────────────────────────────────────────────────────
# OUTCOME  (post-EDAOS)
# Evidence: must reference verifiable trace IDs from EDAOS Execution Journal.
# ─────────────────────────────────────────────────────────────────────────────

outcome:
  measurement_period:  "2026-05-01 to 2026-07-22"   # same 3-month window

  engineering_metrics:
    incidents_per_month:     5.3    # required: true
    mttr_hours:              1.4    # required: true
    defect_escape_rate:      0.008  # required: true
    lcp_p75_ms:              1900
    bundle_size_kb:          190
    manual_review_hours_per_sprint: 3

  edaos_runtime_signals:           # pulled from Execution Journal
    total_decisions_verified:  14800
    decisions_per_day_avg:     164
    saga_rollback_count:       3
    saga_rollback_success_pct: 100.0
    human_veto_count:          2
    human_veto_overridden:     0    # MUST be 0 for L4 compliance

  evidence_trace_samples:          # 5 sample traces for auditor verification
    - "TRACE-1001"
    - "TRACE-1003"
    - "TRACE-1004"
    - "TRACE-2271"
    - "TRACE-4892"

